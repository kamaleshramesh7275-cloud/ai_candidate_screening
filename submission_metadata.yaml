ai_usage_summary: |
  Used Gemini (Antigravity IDE) for architecture discussion, code review, and
  assistance with Python development. All candidate data processing logic was
  designed and verified by the human engineer. No candidate data was sent to
  any external LLM during the ranking step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with five weighted components:
  (1) Skills match (30%): must-have retrieval/embedding/vector-DB keywords
  weighted by proficiency level and duration of use, with assessment score
  bonuses. (2) Career evidence (35%): keyword hits across job descriptions for
  search/retrieval/ranking/recommendation, product-company fraction, and title
  alignment. Entire consulting backgrounds penalized 0.5x. (3) Experience years
  (15%): 5-9 year target band peaks at 6-8 years. (4) Location (10%): Noida/
  Pune preferred per JD, graded by city proximity to office. (5) Behavioral
  signals (10%): recency, open-to-work flag, recruiter response rate, notice
  period, interview completion rate, GitHub activity. Honeypot detection
  filters ~127 candidates with impossible job durations (calculated vs stated
  duration_months > 4 months), excessive expert skills with 0 duration, and
  chronological impossibilities. Runtime: ~3 seconds for 100K candidates
  on CPU. Zero external API calls.

